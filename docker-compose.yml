services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: wherewewere
      POSTGRES_PASSWORD: wherewewere
      POSTGRES_DB: wherewewere
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      #- postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wherewewere -d wherewewere"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://wherewewere:wherewewere@db:5432/wherewewere
      NODE_ENV: ${NODE_ENV:-development}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:?VAPID_PUBLIC_KEY is required}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:?VAPID_PRIVATE_KEY is required}
    ports:
      - "${SERVER_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3001/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_ACCESS_TOKEN: ${API_ACCESS_TOKEN:-}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
