 version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: wherewewere
      POSTGRES_PASSWORD: wherewewere
      POSTGRES_DB: wherewewere
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://wherewewere:wherewewere@db:5432/wherewewere
      PORT: 3001
      NODE_ENV: production
      SESSION_SECRET: change-me-in-production
    ports:
      - "3001:3001"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"
